<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Preferências de cliente — Viral Mind</title>
<style>
  :root{
    --gold:#c9a35c; --ivory:#ededf0; --bg:#0d0d0f; --card:#141416;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ivory);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px;margin:0 auto;width:100%;padding:40px 20px}
  h1{font-size:32px;font-weight:500;margin:0;color:var(--ivory);letter-spacing:-.01em}
  .head-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .subtitle{font-size:13px;color:rgba(255,255,255,.4)}
  .lead{font-size:13px;color:rgba(255,255,255,.45);margin:8px 0 0}
  .search{position:sticky;top:0;z-index:5;padding:16px 0 12px;background:linear-gradient(var(--bg) 70%,transparent)}
  .search input{
    width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);
    color:var(--ivory);border-radius:12px;padding:12px 14px 12px 42px;font-size:14px;outline:none;
  }
  .search input:focus{border-color:rgba(201,163,92,.5)}
  .search-box{position:relative}
  .search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.45}
  .count{font-size:12px;color:rgba(255,255,255,.35);margin-top:8px}
  .list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .card{
    width:100%;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;
    padding:16px 20px;border-radius:16px;border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);transition:border-color .15s;color:inherit;font:inherit;
  }
  .card:hover{border-color:rgba(201,163,92,.3)}
  .card .nome{font-size:14.5px;font-weight:500;color:rgba(237,237,240,.9)}
  .card .sub{font-size:12px;color:rgba(255,255,255,.4)}
  .avatar{
    width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;font-weight:600;
  }
  .chev{margin-left:auto;flex-shrink:0}
  .empty{color:rgba(255,255,255,.4);font-size:14px;padding:20px 4px}
  mark{background:rgba(201,163,92,.28);color:#f0e5cf;border-radius:3px;padding:0 1px}

  /* modal */
  dialog{
    margin:auto;width:min(1080px,95vw);max-height:92vh;padding:0;border:1px solid rgba(201,163,92,.3);
    border-radius:20px;background:var(--card);color:var(--ivory);overflow:hidden;
  }
  dialog[open]{display:flex;flex-direction:column}
  dialog::backdrop{background:rgba(0,0,0,.7);backdrop-filter:blur(3px)}
  .dlg-head{
    display:flex;align-items:center;gap:12px;padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.08);
    background:linear-gradient(rgba(201,163,92,.06),transparent);
  }
  .dlg-head .nome{font-size:15px;font-weight:500}
  .dlg-head .sub{font-size:12px;color:rgba(255,255,255,.4)}
  .close{
    margin-left:auto;flex-shrink:0;width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;
    background:transparent;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;
  }
  .close:hover{color:#fff;background:rgba(255,255,255,.06)}
  .dlg-body{
    flex:1;overflow-y:auto;padding:24px 28px;display:grid;gap:28px 36px;align-content:start;
  }
  @media(min-width:640px){.dlg-body{grid-template-columns:1fr 1fr}}
  .kicker{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;color:rgba(255,255,255,.45)}
  .kicker.red{color:#fca5a5}.kicker.gold{color:var(--gold)}
  .span2{grid-column:1/-1}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:6px 12px;border-radius:999px;border:1px solid;font-size:12.5px;line-height:1.3}
  .chip.danger{border-color:rgba(239,68,68,.35);color:#fca5a5;background:rgba(239,68,68,.05)}
  .chip.gold{border-color:rgba(201,163,92,.4);color:#e8dcc3;background:rgba(201,163,92,.06)}
  .chip.neutral{border-color:rgba(255,255,255,.14);color:rgba(255,255,255,.65)}
  .chip.strike{border-color:rgba(255,255,255,.14);color:rgba(255,255,255,.55);text-decoration:line-through}
  .prose{font-size:13.5px;line-height:1.65;color:rgba(237,237,240,.75);margin:0}
  .prose.muted{color:rgba(237,237,240,.6)}
  .no-prefs{color:rgba(255,255,255,.4);font-size:14px;grid-column:1/-1}
</style>
</head>
<body>
<div class="wrap">
  <div class="head-row">
    <h1>Preferências de cliente</h1>
    <span class="subtitle">a voz de cada um, registrada</span>
  </div>
  <p class="lead">Consulta somente leitura para estrategistas. Clique num cliente para ver as preferências completas.</p>

  <div class="search">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/><path d="M11 11l3 3" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input id="q" type="search" placeholder="Buscar por cliente, tema, proibição, tom de voz, nota…" autocomplete="off" autofocus />
    </div>
    <div class="count" id="count"></div>
  </div>

  <div class="list" id="list"></div>
</div>

<dialog id="dlg">
  <div class="dlg-head">
    <span class="avatar" id="dlgAvatar"></span>
    <div style="min-width:0">
      <div class="nome" id="dlgNome"></div>
      <div class="sub" id="dlgSub"></div>
    </div>
    <button class="close" onclick="dlg.close()" aria-label="Fechar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="dlg-body" id="dlgBody"></div>
</dialog>

<script>
const CLIENTS = [{"nome":"Cadu Neiva","proibicoes":["Falar mal de ninguém ou produzir conteúdo negativo","Postar três vídeos diários (evitar excesso de posts simultâneos)","Usar múltiplos CTAs (call-to-action) no mesmo conteúdo","Ler roteiro mecanicamente sem emoção/energia"],"tom_de_voz":null,"temas_preferidos":["Empresários e empresas de sucesso do Nordeste","Temas que reforcem autoridade e poder de fala de Cadu","Conteúdos que expandam a bolha de consciência além do público-alvo"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Estratégia de conteúdo definida na call: priorizar 1 a 2 vídeos por dia (idealmente 1) para manter consistência, já que o algoritmo não distribui bem múltiplos posts no mesmo dia. Hook (chamado de 'Hulk' na transcrição) é considerado mais importante que o tema em si, com foco em capturar atenção nos primeiros 3 segundos - podendo usar imagens fortes sem fala inicial, e criar curiosidade via afirmações provocativas ou contraditórias. Linha editorial de Cadu explicitamente não inclui falar mal de ninguém ou conteúdo negativo. Fase atual do funil é orgânica, priorizando exposição de marca e crescimento de base antes de estratégias de conversão - por isso evitar múltiplos CTAs que prejudicam engajamento/compartilhamento. Fernando possui banco de 80 roteiros pré-preparados com base em pesquisa de vídeos virais internacionais, notícias e histórias de empresas. Processo de encontrar um formato viral leva cerca de 60 dias de testes; uma vez encontrado, deve ser replicado mantendo consistência. Na performance/gravação, o performer deve transmitir emoção e energia (não apenas ler o roteiro), e o diretor deve corrigir e pedir regravação quando necessário, considerando que as primeiras gravações do dia tendem a ser piores (necessidade de aquecimento).","updated_at":"2026-07-06T15:31:47.408+00:00"},{"nome":"Caio Lima"},{"nome":"Dilson Peres","proibicoes":["Violar regulações da OAB em análises jurídicas","Uso comercial de imagens de terceiros sem enquadramento na Lei 9.610/1998"],"tom_de_voz":null,"temas_preferidos":["Casos jurídicos com histórias reais para prender atenção (ex: caso Van)","Conteúdo jurídico simplificado que aprofunda gradualmente","Temas validados por algoritmo/performance para adaptação ao perfil do Dr. Dilson"],"vocabulario_evitar":["Termos técnicos jurídicos complexos logo no início (nomes de leis direto)"],"vocabulario_usar":["Termos técnicos simplificados no início do conteúdo, aprofundando gradualmente"],"notas_entrevista":"Dr. Dilson atualmente cria conteúdo técnico voltado a advogados, citando nomes de leis diretamente - isso deve mudar para simplificar a linguagem no início e aprofundar gradualmente. Ele trabalha melhor recebendo ideias centrais do que roteiros completos e prontos. Uma tentativa anterior de gravação com teleprompter não funcionou bem, causando travamento na fala. O conteúdo modelo de referência usa histórias de caso (ex: caso \"Van\") para roubar a atenção do público logo no início. A estratégia geral é baseada em Teoria das Restrições e método científico: testar múltiplos looks, temas e estilos de edição até encontrar um formato viral, e então replicar esse formato. O objetivo do conteúdo é furar a bolha e viralizar, não apenas atingir empresários (público-alvo original). Roteiros devem incluir indicações de imagens de apoio e posicionamentos para facilitar a edição. Há preocupação legal explícita: uso de imagens de terceiros deve respeitar a Lei 9.610/1998 (uso de 3-4 segundos para análise crítica/comentário, sem fins comerciais) e evitar violações das regras da OAB, com revisão jurídica cuidadosa dos roteiros antes das gravações.","updated_at":"2026-07-06T15:32:59.975+00:00"},{"nome":"Drielle Castelani","proibicoes":["Não atacar empresas de plano de saúde, pois alguns médicos as usam estrategicamente"],"tom_de_voz":"Sarcástico, trata haters com elegância transformando críticas em conteúdo; comunicação muito objetiva e racional","temas_preferidos":["Comunicação, vendas e processos comerciais","Alta performance e corrida","Viagens e analogias do dia a dia de Drielle (temas secundários para conexão com audiência)","Saída de convênio","Aumento de ticket","Construção de base","Qualidade de vida e organização"],"vocabulario_evitar":["Gestão financeira","Marketing amplo"],"vocabulario_usar":[],"notas_entrevista":"Estratégia dividida em duas etapas: crescimento orgânico inicial (conteúdo não direcionado a venda, testando narrativas) e depois funil de conversão focado em médicos. Roteiros de Reels serão fornecidos pela equipe; Stories devem ser criados por Drielle com máxima personalidade. Inimigos em comum identificados: secretárias que não querem vender e médicos engessados no tempo. Drielle admira conteúdo de Hannah (criadora francesa), mas não está claro se é facilmente adaptável para o formato dela. Estela deve dar feedback natural durante gravação para que Drielle seja autêntica; regravar múltiplas vezes é normal até sair natural e alinhado com a personalidade dela.","updated_at":"2026-07-06T15:34:24.173+00:00"},{"nome":"Fernando Pereira","proibicoes":[],"tom_de_voz":null,"temas_preferidos":["Trade","Finanças","Investimentos","Macroeconomia","Política","Criptomoedas","Geopolítica","Business"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Fernando deseja ser posicionado como especialista em trade, finanças e investimentos, não apenas cripto. A estratégia utiliza temas satélites (geopolítica, política, business) para expandir audiência além do nicho principal. Fernando não impôs restrições explícitas de temas, mas os roteiros podem ser adaptados conforme seu posicionamento pessoal e conforme necessidade no momento da gravação, sem problema. Há um acordo com a Bybit que exige um post semanal, com temas fixos ou abertos conforme combinado, e Fernando deve compartilhar os temas semanais da Bybit com antecedência para incorporação nos roteiros. Não colocar tráfego pago nos vídeos para não distorcer dados de análise. Não foram mencionados explicitamente tom de voz desejado, vocabulário a usar/evitar ou proibições específicas de temas/palavras durante a call.","updated_at":"2026-07-06T15:32:06.828+00:00"},{"nome":"Franklin Tomich","proibicoes":["Não abordar política como tema principal","Não abordar futebol como tema principal","Não abordar finanças pessoais como tema principal"],"tom_de_voz":"Autoridade e seriedade, especialista em fusões e aquisições; críticas a empresas e gestores devem ser construídas e embasadas, elevando autoridade","temas_preferidos":["Fusões e aquisições","Mercado de capitais","Gestão financeira empresarial","Startups","Inovação em empresas","Histórias de empreendedores","Histórias de empresas que faliram por decisões ruins de gestores"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Franklin deve se posicionar como especialista em fusões e aquisições, com conteúdo focado em autoridade e não apenas em temas específicos. Conteúdo principal: fusões, aquisições, mercado de capitais e gestão financeira empresarial. Temas secundários: startups, inovação em empresas e histórias de empreendedores, incluindo casos de empresas que faliram por más decisões de gestores. Explicitamente não deseja tratar política, futebol ou finanças pessoais como temas principais. Críticas a empresas/gestores devem ser sempre construídas e embasadas, para reforçar autoridade. Equipe enviará sete roteiros semanais para gravação em um único dia; produção envolve edição em até 24h e postagem diária, com distribuição do mesmo vídeo em Instagram, YouTube e TikTok. Serão feitos testes AB de cenários, formatos de edição e temas para otimizar resultados, com análise de retenção de audiência. Franklin deve manter padrão visual consistente (roupas e cenário), priorizando boa iluminação; pode gravar em escritório ou em casa, sem necessidade de estúdio profissional. Estratégia de crescimento inclui expandir audiência via conexões com o público-alvo e criar funil de palestras com micro VSL para conversão em clientes. Franklin deve enviar artigos, vídeos e conteúdos interessantes para análise criativa da equipe, considerando viralidade e alinhamento com o posicionamento.","updated_at":"2026-07-06T16:27:16.322+00:00"},{"nome":"Igor Bevilaqua"},{"nome":"Izabela Anholett"},{"nome":"João Felipe","proibicoes":["Religião (não tocar diretamente no tema)","Conteúdo militante sobre política"],"tom_de_voz":"Autoridade e conhecimento, baseado em dados","temas_preferidos":["Treinamento de engenheiros para adaptação à inteligência artificial","Ficção científica","Negócios","Jogos","Xadrez","Conteúdo no estilo Érico Rocha","Investimentos","Intercâmbio e migração internacional","Fé combinada com tecnologia","Insights de livros (João lê 2-3 livros por mês)","IA substituindo empregos / empresas bem estruturadas absorvendo mudanças"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Na call de kickoff, João definiu que não tocará em religião diretamente, mas pode abordar fé combinada com tecnologia. Evitará conteúdo militante sobre política, preferindo se posicionar com autoridade e conhecimento. A narrativa central sugerida é que a IA está substituindo empregos, mas empresas bem estruturadas conseguem absorver essas mudanças - argumento a ser sustentado com dados. João tem expertise em treinamento de engenheiros para adaptação à IA e pode falar com autoridade sobre investimentos, intercâmbio e migração internacional. Temas de interesse pessoal incluem ficção científica, negócios, jogos, xadrez e conteúdo no estilo de Érico Rocha. João lê de 2 a 3 livros por mês, o que pode gerar insights para conteúdo. Não foram mencionados explicitamente vocabulário específico a usar/evitar nem um tom de voz geral para além do foco em autoridade/dados.","updated_at":"2026-07-06T15:33:58.345+00:00"},{"nome":"João Paulo Albuquerque","proibicoes":["Conteúdo político militante","Política generalista como tema"],"tom_de_voz":null,"temas_preferidos":["Pequeno e médio empresário como público principal","Negócios","Marcas e branding","Inteligência artificial","Esporte como gancho/analogia para negócios (golfe, tênis, futebol americano)","Formato 'se eu fosse fazer uma marca' com produção de qualidade","Inovação (inspiração em criadores como Alex Formoso)"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"JP deseja focar em pequeno e médio empresário como público principal. Conteúdo deve evitar política militante/generalista e focar em negócios. Estratégia inclui usar esporte como gancho para direcionar atenção para negócios, aproveitando experiência profissional de golfe (1998-2013) e conhecimento de tênis e futebol americano como analogias. JP se inspira em criadores como Alex Formoso e conteúdos de inovação. Interesse no formato 'se eu fosse fazer uma marca' com produção de qualidade. Temas principais definidos: marcas, branding, negócios e inteligência artificial. Os primeiros três meses serão de testes para encontrar o que funciona melhor. JP pode sugerir temas e conteúdos que consome nas redes sociais. Não há restrições específicas de temas além de evitar política generalista. JP não acompanha esportes intensamente atualmente, mas conhece golfe e tênis.","updated_at":"2026-07-06T16:15:15.974+00:00"},{"nome":"José Securato","proibicoes":["Falar negativamente sobre nada/pessoas ou empresas, preferindo análise construtiva de cenários","Xingamentos ou ofensas a possíveis clientes"],"tom_de_voz":"Crítico de forma lógica e racional (não ofensivo), construtivo, autêntico e pessoal (evitar soar como leitura de roteiro)","temas_preferidos":["Empreendedorismo","Liderança","Economia","Educação","Relacionamentos corporativos","Carreira","Inteligência artificial","Neurociência","Tecnologia"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"JC tem experiência em empreendedorismo desde 2000, com negócios de tecnologia e inovação; é economista e maratonista, com interesse em filosofia e literatura complexa. Deseja explorar repertório cultural para atrair empresários que buscam decisões informadas. Busca autoridade em temas específicos, não em \"mar aberto\" genérico. Público-alvo principal é o profissional corporativo das mil maiores empresas do Brasil (não apenas empresários), faixa etária 25-50 anos, interessados em crescimento de carreira e tecnologia. Conteúdo deve ser acessível para todo o Brasil, com funil específico para o público corporativo. Prefere explicar pessoalmente em vez de ler roteiros para manter autenticidade; roteiros servem de base mas JC os ajusta com sua própria linguagem e estilo. Gravações podem ocorrer em até 250 locais diferentes (incluindo parques) para variedade visual.","updated_at":"2026-07-06T15:34:06.142+00:00"},{"nome":"Leonardo Cirino","proibicoes":["Conteúdo puramente militante","Conteúdo exclusivamente alarmista"],"tom_de_voz":"Leve e menos alarmista sobre o mundo","temas_preferidos":["Geopolítica e macrotemas conectados (forma de abordar política)","Conteúdos que usam conflito para estabelecer relevância e captar atenção"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Leonardo prefere conteúdos com tom leve e menos alarmista sobre o mundo. Criadores de conteúdo devem usar conflito para estabelecer relevância e captar atenção, mas Leonardo não deseja conteúdo puramente militante ou exclusivamente alarmista. Política pode ser abordada através de geopolítica e macrotemas conectados. Leonardo deve compartilhar posicionamentos sobre assuntos no grupo para orientar a comunicação da equipe. Ideias de conteúdo devem ser compartilhadas no grupo durante as gravações. Roteiros serão escritos frase a frase pensando em uso de teleprompter, e alguém deve acompanhar as gravações para garantir coerência emocional e expressão facial.","updated_at":"2026-07-06T15:34:43.883+00:00"},{"nome":"Leonardo Nogueira","proibicoes":["Criticar o governo ativamente"],"tom_de_voz":"Didático, direto, conservador, baseado em números e análises financeiras (arquétipo do sábio/especialista)","temas_preferidos":["Indústria automotiva","Gestão de negócios","Reforma tributária","Estratégia de vendas"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Leonardo é economista com 22 anos de experiência na indústria automotiva e estratégia de vendas. Arquétipo de marca definido como \"o sábio\", posicionando-o como especialista que prova a melhor decisão de locação. Busca construir autoridade pessoal e ser convidado para lugares que não frequenta atualmente. É conservador e pediu explicitamente para não criticar o governo ativamente em conteúdo. Comunicação deve ser didática, direta e baseada em números/análises financeiras. Tema central é indústria automotiva, com temas satélites de gestão de negócios e reforma tributária.","updated_at":"2026-07-06T15:32:21.538+00:00"},{"nome":"Lerry Granville","proibicoes":["Palavrões (Lerry não fala palavrões)"],"tom_de_voz":"Autoridade, com liberdade para abordar temas políticos e polêmicos (Lerry tem boa relação com Brasília e não teme temas sensíveis)","temas_preferidos":["Leilões de imóveis, móveis, carros e internacionais","Inteligência artificial (como chamariz/tema satélite)","Batman","Temas políticos e polêmicos (permitido para Lerry, diferente de outros clientes)","Provas sociais: vídeos de alunos, visitas e arrematações de apartamentos","Palestras e podcasts em formato longo (YouTube)"],"vocabulario_evitar":["Palavrões"],"vocabulario_usar":[],"notas_entrevista":"Lerry atua principalmente com leilões (imóveis, móveis, carros e internacionais), sendo sócio em 16 negócios e conselheiro em outros 16, incluindo parcerias com Érico Rocha. Diferente de outros clientes da equipe (que evitam política, polêmicas aleatórias e religião), Lerry tem liberdade explícita para abordar temas políticos e polêmicos, pois tem excelente relação com Brasília e não teme falar sobre temas sensíveis - a única restrição mencionada é que ele não fala palavrões. A estratégia de conteúdo usa temas satélites (como IA e Batman) para expandir o funil além do público já habituado a leilões, mantendo Lerry posicionado como autoridade no tema principal. O primeiro lançamento será de leilão de móveis, com promessa forte sem mencionar leilões inicialmente. Há bastante material de prova social disponível (vídeos de alunos, arrematações, visitas a apartamentos) e trabalho anterior em YouTube com palestras/podcasts que pode ser retomado em formato longo. Operacionalmente, Lerry grava com iPhone, tem estúdio quase pronto e teleprompter disponível.","updated_at":"2026-07-06T15:31:59.418+00:00"},{"nome":"Lincoln Fracari","proibicoes":[],"tom_de_voz":null,"temas_preferidos":["China","Gestão"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"A transcrição não contém menções explícitas a tom de voz desejado, vocabulário a usar/evitar ou proibições de temas/palavras. Foram identificados apenas os seguintes pontos relevantes sobre estratégia de conteúdo: Lincoln precisa desenvolver personalidade própria em vez de copiar outros criadores; qualidade e consistência são preferíveis a múltiplos formatos com baixo resultado; o carrossel sobre China está gerando melhor engajamento que outros formatos; Lincoln publica muitos formatos diferentes diariamente sem resultados consistentes; Lincoln quer ser referência em gestão, mas já existem muitos criadores nessa área. Os temas 'China' e 'Gestão' foram inferidos como temas de interesse com base no contexto de conteúdo mencionado, mas não há confirmação explícita de preferência de tema por parte do cliente - recomenda-se validar diretamente com Lincoln/Fernando na próxima call.","updated_at":"2026-07-06T15:35:22.214+00:00"},{"nome":"Manoel Victor","proibicoes":["Falar mal de política/governo (pode falar de ações/políticas que deram certo, mas sem viés de defender político específico)","Portal de fofoca (falar de artista, bebê, etc.) - só personalidades ligadas a negócios/empreendedorismo"],"tom_de_voz":"Autêntico, natural, não roteirizado de forma robótica - deve imprimir a personalidade própria do Manoel; pode reagir a grandes acontecimentos e ser levemente incisivo em temas quentes, mas sem viés político de defesa de candidato/partido (libertário, mais aberto a comentar política de ações/resultados do que de defesa ideológica)","temas_preferidos":["Empreendedorismo e negócios","Liderança","Mentalidade empreendedora","Inteligência artificial aplicada a negócios","Cases de sucesso/fracasso de empresas famosas (histórias de empresas, personalidades como Elon Musk, Jeff Bezos, etc.)","Gestão financeira e dinheiro","Negócios digitais","Temas satélites relacionados a empresas de serviços profissionais (marketing, tecnologia, contabilidade, educação/infoprodutos)","Reforma tributária e temas fiscais que afetam empresários","Grandes acontecimentos/notícias quentes (temas de timing, ex: eleições, política quando há acontecimento relevante ligado ao público)","Formatos já existentes no perfil: podcast, '5 erros', '5 perguntas', '5 vilões'"],"vocabulario_evitar":["CTA genérico tipo 'deixa um like, me segue'"],"vocabulario_usar":["CTAs mais 'sensuais'/sofisticados ao invés de 'like e me segue' simples - construir benefício percebido explícito para o espectador seguir"],"notas_entrevista":"Kickoff de projeto de criação de conteúdo (metodologia baseada em teoria das restrições, otimização e crescimento orgânico) para Manoel Victor Tomaz, que atua com empresas de serviços profissionais (agências de marketing, escritórios de tecnologia, fábricas de educação/infoprodutores, mentorias). Fernando Miranda é referência de case de sucesso da metodologia (cresceu para ~200 mil seguidores usando hooks como \"você não sabia mas...\"). Estratégia: 3 pilares - alcance, construção de autoridade e conversão (seguir ou comprar produto). Processo: buscar primeiro o \"formato vencedor\" do perfil do cliente (testando elementos como hook, recursos visuais, música, tema, estilo de gravação) antes de inserir CTAs/ofertas direcionadas ao público-alvo (ICP) de empresas de serviço/tecnologia. Roteiros iniciais (7 por semana) são baseados em benchmarks de conteúdos já validados em outros criadores (ex: histórias de empresas como Red Bull, Airbnb, BMW, fim da Kodak), com temas satélites (personagens/empresas famosas) que se conectam ao público central sem serem óbvios demais. Prioridade do cliente: entender o racional estratégico por trás de cada roteiro, não apenas receber roteiros prontos - quer relatórios semanais com análise de resultado, aprendizados e correções. Prefere ser tratado de forma direta e objetiva pela equipe (já tem conhecimento de marketing, não quer \"chover no molhado\"). Concorda em ser flexível quanto a mudar radicalmente o padrão de postagem atual (hoje \"cumprindo tabela\", sem estratégia real). Cliente é aberto a testar cases que ele mesmo encontrar e compartilhar com a equipe. Ritmo ideal de postagem: 1 a 2 vídeos por dia; edição/hook são fatores críticos para viralização (não necessariamente a história em si). Roteiros podem ser ajustados rapidamente para aproveitar timing de notícias/acontecimentos relevantes ao público (ex: eventos políticos, econômicos). Projeto é de longo prazo (12 meses), com expectativa de resultados graduais após fase de testes e ajustes. Ainda não é o momento de falar sobre \"sucesso pessoal/financeiro\" do Manoel no conteúdo (falta lastro/audiência para isso). Comunicação via grupo de WhatsApp com suporte da consultora Ana Lello para dúvidas de gravação/edição.","updated_at":"2026-07-06T15:33:47.941+00:00"},{"nome":"Marcelo Germano","proibicoes":["Não fazer vídeos críticos de empresas","Evitar temas sem polêmica gratuita (usar ironia e provocação, não polêmica)","Evitar palavras em inglês na linguagem"],"tom_de_voz":"Ironia e provocação, não polêmica","temas_preferidos":["Histórias de empresas de Santa Catarina como marca regional forte","Liderança","Empreendedorismo","Lucro","Processos empresariais","Posicionamento como especialista em gestão de empresas"],"vocabulario_evitar":["Palavras em inglês"],"vocabulario_usar":[],"notas_entrevista":"Público-alvo: empresários que faturam entre 2 e 10 milhões de reais por ano. Simplificar linguagem e CTA para alcançar maior audiência possível. Conteúdo deve iniciar com simplicidade e construir autoridade ao longo. Metodologia Fernando Miranda adaptada para perspectiva de gestão de Marcelo. Evitar temas sem profundidade.","updated_at":"2026-07-06T15:33:21.065+00:00"},{"nome":"Marcio Grazino","proibicoes":["Posicionamento político partidário / críticas governamentais diretas","Termos em inglês"],"tom_de_voz":"Acessível e fácil de digerir, com foco em ritmo, tom de voz e posicionamento (uso de teleprompter); linguagem que qualquer pessoa consiga entender","temas_preferidos":["Empreendedorismo","Liderança","Propósito de vida","Inovação industrial","Sustentabilidade","ESG","Compliance","Filosofia de vida cristã/religiosa"],"vocabulario_evitar":["Termos em inglês"],"vocabulario_usar":[],"notas_entrevista":"Público-alvo principal: empresários médios, jovens empreendedores e universitários. Objetivo de conectar também com público cristão/religioso via filosofia de vida de Márcio. Conteúdo deve ser fácil de digerir, especialmente na primeira metade do vídeo, e usar linguagem simples, sem termos em inglês. Deve-se evitar posicionamento político partidário, mantendo neutralidade em críticas ao governo. Primeiros três meses funcionam como laboratório para testar formatos e temas, com foco em crescimento agressivo de seguidores. Márcio já recebe aulas de comunicação com Celso Cardoso há alguns meses, o que pode influenciar seu estilo de fala/gravação.","updated_at":"2026-07-06T15:34:52.184+00:00"},{"nome":"Marcos Pelozato","proibicoes":["Mencionar juízes e ministros do STF","Falar sobre política","Vincular imagens ou informações falsas a empresas reais","Ofender diretamente pessoas ou empresas, mesmo usando imagens de figuras públicas","Usar comentários vulgares","Adotar tom pessimista ao contar histórias de empresas em dificuldade"],"tom_de_voz":"Storytelling com foco em autoridade profissional, tom de solução e esperança (não pessimista), conectando fé e prosperidade aos negócios","temas_preferidos":["Recuperação judicial","Storytelling de empresas em dificuldades","Agronegócio","Supermercados","Transportadoras","Fé e prosperidade ligadas aos negócios","Aspectos pessoais de Marcos (fé, fazenda, surf)"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Cliente: Marcos, mais de 100 mil seguidores e 19 milhões de visualizações em 30 dias no Instagram. Público-alvo educado, empresário, conectado a temas de recuperação judicial, agronegócio, supermercados e transportadoras; empresários com problemas de fluxo de caixa e dívidas. Marcos trabalha com casos como Starbucks em recuperação judicial, o que valida sua expertise. Estratégia de conteúdo em duas etapas: primeiro crescimento de audiência, depois conversão com CTA. Formatos: \"Café com Conselho\" diário, Carrossel (que funciona muito bem organicamente, com mais de 2 milhões de visualizações), e vídeos de conteúdo. Público não deve ser exposto a comentários vulgares, alinhado ao posicionamento profissional. Metodologia de produção é científica: testar temas, observar resultados, criar hipóteses e otimizar continuamente. Referências de criadores que Marcos acompanha para inspiração: InfoMoney, Nayara Del Duca, Leonardo Leão.","updated_at":"2026-07-06T15:35:14.58+00:00"},{"nome":"Patrick Diorio","proibicoes":["Posicionamento militante","Conteúdo negativo focado em política"],"tom_de_voz":"Autoridade com emoção congruente ao conteúdo; comportamental, não apenas técnico","temas_preferidos":["Soft skills comportamentais","Backstage de processos empresariais","Características comportamentais de líderes (ex: Bill Gates)","Jornada do herói/evolução profissional rápida","Medo do desenvolvedor ficar para trás com IA","Conexão entre hobbies/interesses secundários e tema principal","Crítica a instituições/personas como Anhanguera para criar inimigo comum"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Público-alvo principal: desenvolvedor de TI, nerd, interessado em tecnologia e empresas, com dificuldade em comunicação e posicionamento profissional. Patrick deve se posicionar como especialista em soft skills comportamentais, não apenas tecnologia. Estratégia envolve engenharia reversa de vídeos virais, backstage de processos empresariais, gatilhos de autoridade via jornada do herói, e uso de \"inimigo comum\" (instituições/personas) para engajamento - mas evitando qualquer viés militante ou político negativo. Comunicação aberta é essencial: cliente deve apontar quando o conteúdo não se alinhar com sua personalidade. Feed deve ser exclusivamente dedicado aos roteiros produzidos pela agência (evitar virar \"feira\" de conteúdo desconexo); Stories podem trazer bastidores/eventos para aumentar conexão e captação via algoritmo.","updated_at":"2026-07-06T15:34:15.061+00:00"},{"nome":"Pedro Elero","proibicoes":["Religião","Tópicos muito críticos/polêmicos"],"tom_de_voz":"Fluido e natural, sem pressa, transmitindo autoridade","temas_preferidos":["Negócios e franquias","Futebol","Marketing e crescimento empresarial","Política de direita com perspectiva empresarial","Golf e aprendizado profissional"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Pedro busca se posicionar como autoridade em negócios e franquias, com estratégia clara por trás dos conteúdos, visando comunicar o valor e a narrativa do modelo de negócio (franquia já em operação com 30 unidades, fase pós-testes). Futebol é tema comprovado que já funciona bem no perfil de Pedro; a ideia é explorar temas relevantes para atrair o público-alvo antes de conectar com a mensagem mais profunda sobre negócios. Pedro está aberto a falar sobre política de direita, desde que com perspectiva empresarial, mas não quer abordar religião nem tópicos muito críticos/polêmicos. Golf é um interesse novo de Pedro que pode render conteúdo sobre aprendizado profissional. Na gravação, Pedro deve falar de forma fluida e natural, sem pressa, para facilitar a edição.","updated_at":"2026-07-06T15:35:31.466+00:00"},{"nome":"Rafael Rodrigues","proibicoes":["Conteúdo crítico ao governo, respeitando linha editorial de Rafael"],"tom_de_voz":"Educativo mas engajante","temas_preferidos":["Desenvolvimento profissional para colaboradores de empreendedores","Cases de carreiras bem-sucedidas","Conceitos vinculados a temas virais para engajamento no Instagram"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Rafael quer focar em desenvolvimento profissional para colaboradores de empreendedores, com conteúdo contando cases de carreiras bem-sucedidas em tom educativo mas engajante. Conceitos devem ser vinculados a temas virais para melhor engajamento no Instagram. Rafael explicitamente não quer conteúdo crítico ao governo, respeitando sua linha editorial. O tema de desenvolvimento profissional é considerado suficiente, mas não será o único foco do conteúdo produzido.","updated_at":"2026-07-06T15:32:14.733+00:00"},{"nome":"Renato Torres","proibicoes":["Opinar sobre política","Opinar sobre lei/questões jurídicas","Opinar sobre geopolítica","Focar em números de faturamento"],"tom_de_voz":"Navegador sistêmico, com visão de processos e gargalos; foco em qualidade e impacto","temas_preferidos":["Inteligência artificial","Tecnologia","Marketing","Estruturação de negócios","Alavancagem de negócios","Esporte (tênis e bodybuilding) como tema hobby","Família como tema de contraste","Demanda infinita (conceito central do livro 'A Grande Sacada')"],"vocabulario_evitar":[],"vocabulario_usar":["Demanda infinita","Navegador sistêmico"],"notas_entrevista":"Objetivo é posicionar Renato na internet, aumentando alcance orgânico via linha editorial com temas satélites, mirando macronicho em vez de micronicho. Jornada final da audiência deve levar à Grande Mesa, clube de negócios empresarial. Renato está desenvolvendo um livro chamado 'A Grande Sacada' com subtítulo 'Demanda Infinita', conceito central em sua comunicação e posicionamento de segurança empresarial. Ele evita opinar sobre política, lei e geopolítica por falta de aprofundamento nesses temas. Conteúdo deve priorizar qualidade e impacto ao invés de expor números de faturamento. Esporte (tênis, bodybuilding) é tema hobby forte ligado à disciplina, e família é usada como tema de contraste na persona pública.","updated_at":"2026-07-06T15:35:03.453+00:00"},{"nome":"Ricardo Schumacher","proibicoes":[],"tom_de_voz":null,"temas_preferidos":["Empreendedorismo","Futebol e esportes em geral (ex: Copa do Mundo)","Viagens","Revisão tributária (metodologia Effect)","Conteúdo estilo Havan (replicado do perfil de Edilson)","Abordagem contábil conectando com temas tributários"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"Ricardo é contador (não advogado), e toda a equipe do escritório também é formada por contadores - isso deve ser refletido no posicionamento do conteúdo. O principal canal de aquisição de clientes são parcerias com contadores e advogados. A abordagem contábil, segundo discutido, abre mais possibilidades que a jurídica para conectar com temas tributários. Ricardo segue de perto conteúdos de empreendedorismo e as dinâmicas do G4. A metodologia Effect enfatiza que 'cada centavo importa' na revisão tributária - possível linha de discurso a ser usada nos roteiros. Não foram mencionados explicitamente um tom de voz específico, palavras a evitar/usar ou proibições de temas durante a call - esses pontos podem precisar ser levantados em conversa futura.","updated_at":"2026-07-06T15:34:33.59+00:00"},{"nome":"Rodrigo Waughan","proibicoes":["Postar conteúdo inconsistente que quebra a linha editorial","Rodar tráfego pago durante a fase de testes","Impulsionar vídeos individuais durante a fase de testes","Falar sobre política, religião ou questões de gênero","Mostrar família nas redes sociais por questões de segurança","Falar sobre dinheiro pessoal ou riqueza nas redes sociais"],"tom_de_voz":null,"temas_preferidos":["Inovação","Prosperidade","Liderança empresarial","Reflexão","Histórias de sucesso de outras pessoas (como reflexão)","Exposição da empresa e colaboradores","Conteúdo empresarial e corporativo (cortes de podcast)","Trends para humanizar e alcançar novo público"],"vocabulario_evitar":[],"vocabulario_usar":[],"notas_entrevista":"A estratégia de conteúdo segue abordagem de método científico (observação, hipótese, teste, análise) para descobrir um \"formato campeão\" replicável, buscando consistência para construir marca mental. O público-alvo ideal são micro e pequenos empresários, revendedores e franqueados, já que Rodrigo é presidente do Grupo Gerbera. A estratégia busca humanizar Rodrigo mostrando facetas além do empresário formal, sendo permitido usar esquetes e momentos pessoais (exceto família) para gerar engajamento. Há uma estrutura semanal de conteúdo definida: segunda (posicionamento/reflexão para colaboradores/revendedoras), quarta (carrossel corporativo), sexta (posicionamento como empresário), sábado (trends), domingo (cortes de podcast empresarial/corporativo). Fernando deve enviar áudio para Rodrigo detalhando as proibições de conteúdo inconsistente e impulsos pagos.","updated_at":"2026-07-06T15:33:12.57+00:00"},{"nome":"Thiago Franco","proibicoes":["Conteúdo focado em 'renda extra' ou público que busca se arriscar no digital (empresa não tem produto low ticket para esse público)","Fugir muito do público-alvo ideal (empresário/CNPJ que fatura acima de 100 mil offline ou 60 mil em marketplace)"],"tom_de_voz":"Simplicidade na comunicação, discurso simplificado, linguagem direta e acessível (evitar termos técnicos complexos), autêntico e próximo da personalidade real do cliente","temas_preferidos":["Cases de sucesso de clientes da consultoria (estudos de caso passo a passo)","Marcas de marketplace conhecidas: Mercado Livre, Shopee, Amazon, Magalu, Temu, TikTok Shop, AliExpress","Reforma tributária (atrai público empresário qualificado)","Importação da China / produtos chineses / investimentos de empresas chinesas no Brasil","25 de Março (região de comércio/importação)","Dinheiro, negócios digitais, empreendedorismo, liderança, técnicas de venda, marketing digital","Inteligência Artificial (quando conectável ao nicho)","Bastidores/estoque de operações (ex: robôs no CD do Mercado Livre)","Notícias e assuntos quentes do varejo/e-commerce"],"vocabulario_evitar":["Termos técnicos como 'CAC', 'LTV' e jargões de marketing/negócios muito técnicos (o público de mídia orgânica é mais amplo e não conhece esses termos)"],"vocabulario_usar":["Nomes explícitos de marketplaces (Mercado Livre, Shopee, Amazon, Magalu, Temu, Shein, AliExpress)","Linguagem simples e direta, sem jargões técnicos no início do roteiro"],"notas_entrevista":"Cliente: Thiago Franco, e-commerce/consultoria de marketplace. Objetivo principal do orgânico: aumentar alcance para gerar topo de funil qualificado (hoje 90% da receita vem de tráfego pago, o que é visto como não saudável a longo prazo). Público-alvo ideal: empresário com CNPJ que fatura acima de 100 mil/mês no offline vendendo produto físico e quer migrar para marketplace, ou que já vende acima de 60 mil/mês em Mercado Livre/Shopee/Amazon. Ticket de entrada da consultoria é de 6 mil (não é produto low ticket). Cliente está confortável em repetir um formato vencedor exaustivamente ('espremer a laranja') ao invés de diversificar - só quer o formato campeão. Não terá mais carrossel no feed, seguindo caminho formato já validado (referência: perfil do Fernando). Interesse forte em usar cases de sucesso reais de clientes da consultoria (ex: 0 a 700 mil em 5 meses, 400 mil a 2 milhões, 30 milhões a 48 milhões) como formato de conteúdo, pois gera autoridade e prova social - já possuem mais de 10 estudos de caso prontos, sendo que já postaram 8 cases. Cliente quer que a produção de conteúdo seja intensa desde o início (mais de 1 vídeo por semana se possível), com prioridade máxima no primeiro trimestre para geração de conteúdo. Pediu que a equipe trate a ele e ao Gustavo (editor) como '100% júnior', com direcionamentos bem detalhados sobre formato de edição (ex: como estruturar os primeiros 3 segundos, uso de b-roll, tela dividida, etc.), pois consideram isso um ponto de dúvida importante. Interesse em receber vídeos de referência para modelagem. Solicitou possível call adicional focada especificamente em estratégias de edição. Fernando Miranda (referência de sucesso) tem tom mais informal e usa muitas histórias/storytelling, com foco em captar atenção de público amplo e não nichado (estratégia de 'canhão' ao invés de 'sniper', atingindo públicos adjacentes/satélites ao invés de mirar só o público final). Estratégia de growth baseada em teoria das restrições: foco em um gargalo por vez (hook 3s, retenção até 7s, retenção até CTA, conversão do CTA). Formatos que mais performam no perfil atual: vídeos de análise/estudo de caso com números e explicação de estratégia. Cliente disponibilizará agenda a partir da semana seguinte para gravações, com flexibilidade para aumentar quantidade de roteiros semanais conforme agenda permitir.","updated_at":"2026-07-06T15:32:50.166+00:00"}];

const AVATAR_COLORS = [
  {bg:"rgba(99,102,241,.15)",border:"rgba(99,102,241,.4)",text:"#a5b4fc"},
  {bg:"rgba(16,185,129,.12)",border:"rgba(16,185,129,.35)",text:"#6ee7b7"},
  {bg:"rgba(245,158,11,.12)",border:"rgba(245,158,11,.35)",text:"#fbbf24"},
  {bg:"rgba(201,163,92,.14)",border:"rgba(201,163,92,.45)",text:"#c9a35c"},
];
function avatarColor(nome){let h=0;for(const ch of nome)h=(h*31+ch.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}

function relTime(iso){
  if(!iso)return null;
  const days=Math.round((Date.now()-new Date(iso).getTime())/86400000);
  const rtf=new Intl.RelativeTimeFormat("pt-BR",{numeric:"auto"});
  if(days<1)return"atualizado hoje";
  if(days<30)return"atualizado "+rtf.format(-days,"day");
  if(days<365)return"atualizado "+rtf.format(-Math.round(days/30),"month");
  return"atualizado "+rtf.format(-Math.round(days/365),"year");
}
function arr(x){return Array.isArray(x)?x:[]}
function hasPrefs(c){return!!(arr(c.proibicoes).length||arr(c.vocabulario_evitar).length||arr(c.vocabulario_usar).length||arr(c.temas_preferidos).length||c.tom_de_voz||c.notas_entrevista)}
function subtitle(c){return hasPrefs(c)?(relTime(c.updated_at)||"preferências registradas"):"sem preferências registradas"}
function esc(s){return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}

// searchable blob per client (lowercased)
CLIENTS.forEach(c=>{
  c._search=[c.nome,c.tom_de_voz,c.notas_entrevista,...arr(c.proibicoes),...arr(c.temas_preferidos),...arr(c.vocabulario_evitar),...arr(c.vocabulario_usar)].filter(Boolean).join("  ").toLowerCase();
});

const listEl=document.getElementById("list");
const countEl=document.getElementById("count");
const qEl=document.getElementById("q");
const dlg=document.getElementById("dlg");

function hi(text,q){
  if(!text)return"";
  if(!q)return esc(text);
  const t=esc(text),re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
  return t.replace(re,"<mark>$1</mark>");
}

function render(){
  const q=qEl.value.trim().toLowerCase();
  const shown=CLIENTS.filter(c=>!q||c._search.includes(q));
  listEl.innerHTML=shown.map(c=>{
    const av=avatarColor(c.nome);const i=CLIENTS.indexOf(c);
    return `<button class="card" onclick="openClient(${i})">
      <span class="avatar" style="background:${av.bg};border:1px solid ${av.border};color:${av.text}">${esc(c.nome.charAt(0).toUpperCase())}</span>
      <div style="min-width:0">
        <div class="nome">${hi(c.nome,q)}</div>
        <div class="sub">${esc(subtitle(c))}</div>
      </div>
      <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;
  }).join("");
  countEl.textContent=q?`${shown.length} de ${CLIENTS.length} clientes`:`${CLIENTS.length} clientes`;
  if(!shown.length)listEl.innerHTML=`<p class="empty">Nenhum cliente ou informação corresponde a “${esc(qEl.value)}”.</p>`;
}

function section(label,cls,html){return`<div><div class="kicker ${cls||''}">${label}</div>${html}</div>`}
function chips(items,variant,q){return`<div class="chips">${items.map(i=>`<span class="chip ${variant}">${hi(i,q)}</span>`).join("")}</div>`}

function openClient(i){
  const c=CLIENTS[i],av=avatarColor(c.nome),q=qEl.value.trim().toLowerCase();
  document.getElementById("dlgAvatar").textContent=c.nome.charAt(0).toUpperCase();
  Object.assign(document.getElementById("dlgAvatar").style,{background:av.bg,border:"1px solid "+av.border,color:av.text});
  document.getElementById("dlgNome").innerHTML=hi(c.nome,q);
  document.getElementById("dlgSub").textContent=subtitle(c);
  const body=document.getElementById("dlgBody");
  let h="";
  if(!hasPrefs(c))h+=`<p class="no-prefs">Nenhuma preferência registrada ainda.</p>`;
  if(arr(c.proibicoes).length)h+=section("Proibições","red",chips(c.proibicoes,"danger",q));
  if(c.tom_de_voz)h+=section("Tom de voz","",`<p class="prose">${hi(c.tom_de_voz,q)}</p>`);
  if(arr(c.vocabulario_evitar).length)h+=section("Vocabulário — evitar","",chips(c.vocabulario_evitar,"strike",q));
  if(arr(c.vocabulario_usar).length)h+=section("Vocabulário — preferir","gold",chips(c.vocabulario_usar,"gold",q));
  if(arr(c.temas_preferidos).length)h+=section("Temas","",chips(c.temas_preferidos,"neutral",q));
  if(c.notas_entrevista)h+=`<div class="span2"><div class="kicker">Notas de entrevista</div><p class="prose muted">${hi(c.notas_entrevista,q)}</p></div>`;
  body.innerHTML=h;
  dlg.showModal();
}

dlg.addEventListener("click",e=>{if(e.target===dlg)dlg.close();});
qEl.addEventListener("input",render);
render();
</script>
</body>
</html>
